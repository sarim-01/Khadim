<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Khadim – Kitchen Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 2px solid #D4AF37;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.3rem; color: #D4AF37; letter-spacing: 1px; }
    #last-updated { font-size: 0.75rem; color: #888; }

    #main { padding: 24px; }

    #empty-msg {
      display: none;
      text-align: center;
      margin-top: 80px;
      font-size: 1.4rem;
      color: #555;
    }

    .order-block { margin-bottom: 32px; }

    .order-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a2d3a;
    }
    .order-header span { color: #D4AF37; }

    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .task-card {
      background: #1a1d27;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #2a2d3a;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .item-name { font-weight: 600; font-size: 0.95rem; }
    .item-qty  { font-size: 0.8rem; color: #888; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-QUEUED      { background: #3a2800; color: #f5a623; border: 1px solid #f5a623; }
    .badge-IN_PROGRESS { background: #002040; color: #4db6ff; border: 1px solid #4db6ff; }
    .badge-READY       { background: #002a10; color: #4caf50; border: 1px solid #4caf50; }

    .task-meta { font-size: 0.78rem; color: #999; display: flex; gap: 16px; }
    .task-meta strong { color: #ccc; }

    .action-btn {
      margin-top: 6px;
      padding: 8px 0;
      width: 100%;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.85; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start    { background: #f5a623; color: #000; }
    .btn-ready    { background: #4db6ff; color: #000; }
    .btn-complete { background: #4caf50; color: #000; }
  </style>
</head>
<body>
  <header>
    <h1>🍽️ Khadim Kitchen Dashboard</h1>
    <span id="last-updated">Loading…</span>
  </header>

  <div id="main">
    <div id="orders-container"></div>
    <div id="empty-msg">No active orders 🎉</div>
  </div>

  <script>
    async function loadOrders() {
      try {
        const res = await fetch('/kitchen/orders');
        const data = await res.json();
        renderOrders(data.orders || []);
        document.getElementById('last-updated').textContent =
          'Updated: ' + new Date().toLocaleTimeString();
      } catch (e) {
        console.error('Failed to load orders:', e);
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('orders-container');
      const emptyMsg  = document.getElementById('empty-msg');
      container.innerHTML = '';

      if (!orders.length) {
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';

      for (const order of orders) {
        const block = document.createElement('div');
        block.className = 'order-block';

        const header = document.createElement('div');
        header.className = 'order-header';
        header.innerHTML = `Order <span>#${order.order_id}</span> &nbsp;–&nbsp; Overall: <span>${order.overall_status}</span>`;
        block.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'tasks-grid';

        for (const task of order.tasks) {
          grid.appendChild(buildTaskCard(task));
        }

        block.appendChild(grid);
        container.appendChild(block);
      }
    }

    function buildTaskCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.id = `task-${task.task_id}`;

      card.innerHTML = `
        <div class="task-header">
          <div>
            <div class="item-name">${task.item_name}</div>
            <div class="item-qty">Qty: ${task.qty}</div>
          </div>
          <span class="badge badge-${task.status}">${task.status.replace('_', ' ')}</span>
        </div>
        <div class="task-meta">
          <div><strong>Station</strong><br>${task.station}</div>
          <div><strong>Chef</strong><br>${task.assigned_chef}</div>
          <div><strong>Est.</strong><br>${task.estimated_minutes} min</div>
        </div>
      `;

      const btn = document.createElement('button');
      btn.className = 'action-btn';

      if (task.status === 'QUEUED') {
        btn.textContent = 'Start Preparing';
        btn.classList.add('btn-start');
        btn.onclick = () => updateStatus(task.task_id, 'IN_PROGRESS', btn);
      } else if (task.status === 'IN_PROGRESS') {
        btn.textContent = 'Mark Ready';
        btn.classList.add('btn-ready');
        btn.onclick = () => updateStatus(task.task_id, 'READY', btn);
      } else if (task.status === 'READY') {
        btn.textContent = 'Complete & Remove';
        btn.classList.add('btn-complete');
        btn.onclick = () => updateStatus(task.task_id, 'COMPLETED', btn);
      }

      card.appendChild(btn);
      return card;
    }

    async function updateStatus(taskId, newStatus, btn) {
      btn.disabled = true;
      btn.textContent = 'Updating…';
      try {
        const res = await fetch(`/kitchen/tasks/${encodeURIComponent(taskId)}/update-status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ new_status: newStatus }),
        });
        const data = await res.json();
        if (!data.success) {
          alert('Update failed: ' + (data.message || 'Unknown error'));
          btn.disabled = false;
        }
      } catch (e) {
        alert('Network error: ' + e);
        btn.disabled = false;
      }
      await loadOrders();
    }

    loadOrders();
    setInterval(loadOrders, 5000);
  </script>
</body>
</html>
