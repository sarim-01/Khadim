name: khaadim
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  flutter_sound: ^9.2.13
  permission_handler: ^11.0.1
  just_audio: ^0.9.36
  flutter_rating_bar: ^4.0.1
  flutter_tts: ^3.6.3
  http: ^1.1.0
  audioplayers: ^6.0.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.8
  path_provider: ^2.0.15
  flutter_secure_storage: ^9.2.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/khaadim_logo_dark.png
    - assets/images/khaadim_logo_light.png
    - assets/images/menu/bbq/
    - assets/images/menu/bread/
    - assets/images/menu/chinese/
    - assets/images/menu/desi/
    - assets/images/menu/drinks/
    - assets/images/menu/fast_food/
    - assets/images/deals/
    - assets/images/confirm.png